<!DOCTYPE html>
<html>
<head>
    <title>Traffic Light</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Traffic Light</h1>

<p id="status">Status: Ready</p>

<div class="traffic-light">
    <div class="light red" id="red"></div>
    <div class="light yellow" id="yellow"></div>
    <div class="light green" id="green"></div>
</div>

<div class="buttons">
    <button onclick="changeLight()">Change</button>
    <button onclick="resetLight()">Reset</button>
    <button onclick="toggleAuto()">Auto</button>
</div>

<script src="script.js"></script>

</body>
</html>
