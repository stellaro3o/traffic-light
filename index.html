<!DOCTYPE html>
<html>
<head>
    <title>Traffic Control Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg-glow"></div>

<div class="container">

    <div class="title">
        <h1>TRAFFIC CONTROL SYSTEM</h1>
        <p id="status">Initializing system...</p>
    </div>

    <div class="dashboard">

        <div class="traffic-box">
            <div class="traffic-light">
                <div class="light red" id="red"></div>
                <div class="light yellow" id="yellow"></div>
                <div class="light green" id="green"></div>
            </div>
        </div>

        <div class="controls">
            <button onclick="changeLight()">NEXT SIGNAL</button>
            <button onclick="resetLight()">RESET</button>
            <button onclick="toggleAuto()" id="autoBtn">AUTO MODE</button>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
